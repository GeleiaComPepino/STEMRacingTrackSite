<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEM Racing Track - Sennax</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="icon" type="image/png" href="https://images.squarespace-cdn.com/content/v1/68b858da4556365ec586dae9/55a79a0c-d1bf-4582-b2ad-01a2058da151/favicon.ico">
</head>
<body>
    <img src="assets/Sennax.png" alt="Sennax Logo" class="logo">
    <div class="main-container">
        <div class="green-button" onclick="resetLights()">
        </div>
        <div class="lights-container">
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
        </div>
    </div>
    <div class="content-container">
        <h1 class="content-title">GET SET</h1>
        <h2 class="winner-display" id="winnerDisplay"></h2>
        <div class="data-grid">
            <div class="lane-column">
                <div class="data-row">
                    <span class="data-label large">LANE1</span>
                    <span class="data-label large">REACTION TIME</span>
                    <span class="seven-text off">0.000</span>
                </div>
            </div>
            <div class="lane-column">
                <div class="data-row">
                    <span class="data-label large">LANE 2</span>
                    <span class="data-label large">REACTION TIME</span>
                    <span class="seven-text off">0.000</span>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-text">
        Sennax Scuderia ™ </br>
        2025-2026 | All rights reserved
    </footer>

    <script src="assets/index.js"></script>
</body>
</html>
